<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- identical outputs queuing -->
  <g fill="rgba(233,234,255,0.35)">
    <rect x="280" y="415" width="70" height="70"/>
    <rect x="400" y="415" width="70" height="70"/>
    <rect x="520" y="415" width="70" height="70"/>
  </g>
  <!-- the gate -->
  <rect x="700" y="330" width="240" height="240" fill="none" stroke="rgb(99,104,218)" stroke-width="8"/>
  <!-- the one under examination -->
  <rect x="785" y="415" width="70" height="70" fill="rgb(233,234,255)"/>
  <!-- the examining eye: crosshair marks -->
  <g stroke="rgb(99,104,218)" stroke-width="5">
    <line x1="820" y1="360" x2="820" y2="395"/>
    <line x1="820" y1="505" x2="820" y2="540"/>
    <line x1="730" y1="450" x2="765" y2="450"/>
    <line x1="875" y1="450" x2="910" y2="450"/>
  </g>
  <!-- the cleared output -->
  <rect x="1060" y="415" width="70" height="70" fill="rgb(99,104,218)"/>
  <path d="M 1180 450 L 1280 450 M 1280 450 L 1252 430 M 1280 450 L 1252 470"
        stroke="rgba(233,234,255,0.4)" stroke-width="5" fill="none"/>
</svg>
