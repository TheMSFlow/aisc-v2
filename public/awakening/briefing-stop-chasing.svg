<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- the torrent rushing past -->
  <g stroke="rgba(233,234,255,0.28)" stroke-width="5" stroke-linecap="round">
    <line x1="240" y1="240" x2="360" y2="240"/><line x1="480" y1="240" x2="560" y2="240"/><line x1="700" y1="240" x2="820" y2="240"/><line x1="980" y1="240" x2="1060" y2="240"/><line x1="1200" y1="240" x2="1330" y2="240"/>
    <line x1="300" y1="330" x2="420" y2="330"/><line x1="560" y1="330" x2="640" y2="330"/><line x1="800" y1="330" x2="930" y2="330"/><line x1="1100" y1="330" x2="1190" y2="330"/>
    <line x1="260" y1="570" x2="380" y2="570"/><line x1="520" y1="570" x2="600 " y2="570"/><line x1="760" y1="570" x2="880" y2="570"/><line x1="1040" y1="570" x2="1130" y2="570"/><line x1="1270" y1="570" x2="1370" y2="570"/>
    <line x1="320" y1="660" x2="440" y2="660"/><line x1="600" y1="660" x2="680" y2="660"/><line x1="860" y1="660" x2="990" y2="660"/><line x1="1160" y1="660" x2="1250" y2="660"/>
  </g>
  <!-- the torrent parting around the still point -->
  <g stroke="rgba(233,234,255,0.28)" stroke-width="5" stroke-linecap="round">
    <line x1="280" y1="450" x2="560" y2="450"/>
    <line x1="1060" y1="450" x2="1340" y2="450"/>
  </g>
  <!-- the still, held point -->
  <circle cx="800" cy="450" r="30" fill="rgb(233,234,255)"/>
  <circle cx="800" cy="450" r="72" fill="none" stroke="rgb(99,104,218)" stroke-width="7"/>
</svg>
