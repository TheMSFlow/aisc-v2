<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- the boundary -->
  <rect x="280" y="380" width="880" height="340" fill="none" stroke="rgb(99,104,218)" stroke-width="6" stroke-dasharray="18 12"/>
  <!-- the agent's task sequence, running inside -->
  <g fill="rgba(233,234,255,0.5)">
    <circle cx="400" cy="550" r="14"/>
    <circle cx="580" cy="550" r="14"/>
    <circle cx="760" cy="550" r="14"/>
    <circle cx="940" cy="550" r="14"/>
  </g>
  <g stroke="rgba(233,234,255,0.3)" stroke-width="4">
    <line x1="414" y1="550" x2="566" y2="550"/>
    <line x1="594" y1="550" x2="746" y2="550"/>
    <line x1="774" y1="550" x2="926" y2="550"/>
  </g>
  <!-- the escalation: one node rises above the boundary to the leader -->
  <line x1="760" y1="536" x2="1150" y2="240" stroke="rgb(99,104,218)" stroke-width="5"/>
  <circle cx="1190" cy="215" r="24" fill="rgb(233,234,255)"/>
  <circle cx="1190" cy="215" r="54" fill="none" stroke="rgba(99,104,218,0.6)" stroke-width="5"/>
</svg>
