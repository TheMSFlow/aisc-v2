<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- scattered unbound lines: unexamined habits -->
  <g stroke="rgba(233,234,255,0.22)" stroke-width="5" stroke-linecap="round">
    <line x1="300" y1="300" x2="470" y2="280" transform="rotate(-6 385 290)"/>
    <line x1="330" y1="430" x2="520" y2="440" transform="rotate(4 425 435)"/>
    <line x1="290" y1="560" x2="450" y2="580" transform="rotate(-8 370 570)"/>
    <line x1="1120" y1="320" x2="1300 " y2="300" transform="rotate(7 1210 310)"/>
    <line x1="1150" y1="470" x2="1330" y2="480" transform="rotate(-5 1240 475)"/>
    <line x1="1110" y1="610" x2="1290" y2="630" transform="rotate(6 1200 620)"/>
  </g>
  <!-- the single authored page -->
  <rect x="670" y="220" width="280" height="400" fill="none" stroke="rgb(99,104,218)" stroke-width="8"/>
  <g stroke="rgba(233,234,255,0.6)" stroke-width="5" stroke-linecap="round">
    <line x1="720" y1="300" x2="890" y2="300"/>
    <line x1="720" y1="360" x2="860" y2="360"/>
    <line x1="720" y1="420" x2="900" y2="420"/>
    <line x1="720" y1="480" x2="850" y2="480"/>
  </g>
  <!-- the signature -->
  <path d="M 720 560 q 30 -26 55 0 q 25 24 55 -6 q 20 -18 40 4"
        fill="none" stroke="rgb(233,234,255)" stroke-width="5" stroke-linecap="round"/>
</svg>
