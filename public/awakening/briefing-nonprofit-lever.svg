<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- ground -->
  <line x1="220" y1="700" x2="1380" y2="700" stroke="rgba(233,234,255,0.16)" stroke-width="2"/>
  <!-- fulcrum -->
  <path d="M 870 700 L 950 700 L 910 580 Z" fill="rgba(233,234,255,0.35)"/>
  <!-- lever beam -->
  <line x1="380" y1="470" x2="1300 " y2="640" stroke="rgb(99,104,218)" stroke-width="10" stroke-linecap="round"/>
  <!-- the small team, at the long end -->
  <g fill="rgb(233,234,255)">
    <circle cx="360" cy="420" r="13"/>
    <circle cx="410" cy="400" r="13"/>
    <circle cx="385" cy="360" r="13"/>
  </g>
  <!-- the weight being lifted -->
  <rect x="1180" y="480" width="150" height="150" fill="none" stroke="rgb(233,234,255)" stroke-width="5"/>
  <rect x="1210" y="510" width="90" height="90" fill="rgba(99,104,218,0.55)"/>
</svg>
