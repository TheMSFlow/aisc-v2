<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- the line -->
  <line x1="880" y1="140" x2="880" y2="760" stroke="rgb(99,104,218)" stroke-width="8"/>
  <!-- data allowed through -->
  <g fill="rgba(233,234,255,0.35)">
    <rect x="990" y="300" width="36" height="36"/>
    <rect x="1090" y="420" width="36" height="36"/>
    <rect x="1000" y="540" width="36" height="36"/>
  </g>
  <!-- data approaching -->
  <g fill="none" stroke="rgba(233,234,255,0.35)" stroke-width="3">
    <rect x="360" y="330" width="36" height="36"/>
    <rect x="470" y="420" width="36" height="36"/>
    <rect x="380" y="520" width="36" height="36"/>
  </g>
  <!-- data held back: solid, protected -->
  <g fill="rgb(233,234,255)">
    <rect x="700" y="280" width="40" height="40"/>
    <rect x="740" y="430" width="40" height="40"/>
    <rect x="690" y="580" width="40" height="40"/>
  </g>
</svg>
