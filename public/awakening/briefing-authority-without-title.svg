<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- org chart dots -->
  <g fill="rgba(233,234,255,0.3)">
    <circle cx="800" cy="180" r="12"/>
    <circle cx="560" cy="330" r="12"/>
    <circle cx="1040" cy="330" r="12"/>
    <circle cx="420" cy="500" r="12"/>
    <circle cx="940" cy="500" r="12"/>
    <circle cx="1160" cy="500" r="12"/>
    <circle cx="320" cy="670" r="12"/>
