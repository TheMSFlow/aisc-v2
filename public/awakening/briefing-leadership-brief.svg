<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- the brief: one structured block -->
  <rect x="300" y="330" width="300" height="240" fill="none" stroke="rgb(99,104,218)" stroke-width="8"/>
  <g stroke="rgba(233,234,255,0.55)" stroke-width="6" stroke-linecap="round">
    <line x1="345" y1="400" x2="510" y2="400"/>
    <line x1="345" y1="450" x2="555" y2="450"/>
    <line x1="345" y1="500" x2="480" y2="500"/>
  </g>
  <!-- the handoff -->
  <path d="M 660 450 L 800 450 M 800 450 L 770 428 M 800 450 L 770 472"
        stroke="rgba(233,234,255,0.35)" stroke-width="5" fill="none"/>
  <!-- aligned output -->
  <g fill="rgb(233,234,255)">
    <rect x="880" y="330" width="70" height="70" fill-opacity="0.35"/>
    <rect x="990" y="330" width="70" height="70" fill-opacity="0.55"/>
    <rect x="1100" y="330" width="70" height="70" fill-opacity="0.8"/>
    <rect x="880" y="440" width="70" height="70" fill-opacity="0.55"/>
    <rect x="990" y="440" width="70" height="70" fill-opacity="0.8"/>
    <rect x="1100" y="440" width="70" height="70"/>
  </g>
</svg>
