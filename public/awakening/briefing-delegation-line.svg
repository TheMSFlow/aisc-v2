<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- the matrix: two axes -->
  <g stroke="rgba(233,234,255,0.16)" stroke-width="2">
    <line x1="800" y1="90" x2="800" y2="810"/>
    <line x1="180" y1="450" x2="1420" y2="450"/>
  </g>
  <!-- pattern work: a stream of identical squares handed over (upper left, moving out) -->
  <g fill="none" stroke="rgba(233,234,255,0.35)" stroke-width="3">
    <rect x="270" y="200" width="44" height="44"/>
    <rect x="360" y="230" width="44" height="44"/>
    <rect x="450" y="260" width="44" height="44"/>
    <rect x="540" y="290" width="44" height="44"/>
  </g>
  <g fill="rgb(99,104,218)">
    <rect x="630" y="320" width="44" height="44"/>
  </g>
  <path d="M 700 342 L 762 342 M 762 342 L 736 322 M 762 342 L 736 362"
        stroke="rgb(99,104,218)" stroke-width="6" fill="none"/>
  <!-- judgment work: one point, held (lower right) -->
  <circle cx="1130" cy="640" r="26" fill="rgb(233,234,255)"/>
  <circle cx="1130" cy="640" r="58" fill="none" stroke="rgb(99,104,218)" stroke-width="6"/>
  <!-- faint marks in the other quadrants -->
  <g fill="rgba(233,234,255,0.22)">
    <circle cx="1080" cy="240" r="8"/>
    <rect x="1150" y="270" width="16" height="16"/>
    <circle cx="1230" cy="215" r="8"/>
  </g>
  <g stroke="rgba(233,234,255,0.18)" stroke-width="3" fill="none">
    <path d="M 320 620 L 360 660 M 360 620 L 320 660"/>
    <path d="M 450 680 L 490 720 M 490 680 L 450 720"/>
  </g>
</svg>
