<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- reach: arcs radiating outward -->
  <g fill="none" stroke="rgb(99,104,218)">
    <path d="M 640 250 A 260 260 0 0 1 640 650" stroke-width="6" stroke-opacity="0.9"/>
    <path d="M 700 170 A 360 360 0 0 1 700 730" stroke-width="5" stroke-opacity="0.55"/>
    <path d="M 760 100 A 460 460 0 0 1 760 800" stroke-width="4" stroke-opacity="0.3"/>
  </g>
  <!-- the flock, reached -->
  <g fill="rgba(233,234,255,0.4)">
    <circle cx="1010" cy="330" r="9"/>
    <circle cx="1090" cy="450" r="9"/>
    <circle cx="1010" cy="570" r="9"/>
    <circle cx="1210" cy="380" r="9"/>
    <circle cx="1240" cy="520" r="9"/>
  </g>
  <!-- the shepherd: held center -->
  <circle cx="480" cy="450" r="26" fill="rgb(233,234,255)"/>
  <circle cx="480" cy="450" r="60" fill="none" stroke="rgba(233,234,255,0.35)" stroke-width="3"/>
</svg>
