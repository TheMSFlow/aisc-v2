<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- the congregation: many looking in the same direction -->
  <g fill="rgba(233,234,255,0.22)">
    <circle cx="260" cy="640" r="9"/><circle cx="380" cy="600" r="9"/><circle cx="500" cy="650" r="9"/><circle cx="620" cy="610" r="9"/><circle cx="740" cy="655" r="9"/><circle cx="860" cy="615" r="9"/><circle cx="980" cy="645" r="9"/><circle cx="1100" cy="605" r="9"/><circle cx="1220" cy="650" r="9"/><circle cx="1340" cy="620" r="9"/>
    <circle cx="320" cy="730" r="9"/><circle cx="440" cy="700" r="9"/><circle cx="560" cy="740" r="9"/><circle cx="680" cy="705" r="9"/><circle cx="800" cy="745" r="9"/><circle cx="920" cy="710" r="9"/><circle cx="1040" cy="740" r="9"/><circle cx="1160" cy="705" r="9"/><circle cx="1280" cy="745" r="9"/>
  </g>
  <!-- rays of attention converging upward -->
  <g stroke="rgba(99,104,218,0.35)" stroke-width="2">
    <line x1="380" y1="590" x2="770" y2="270"/>
    <line x1="620" y1="600" x2="785" y2="280"/>
    <line x1="860" y1="605" x2="800" y2="285"/>
    <line x1="1100" y1="595" x2="815" y2="275"/>
    <line x1="1280" y1="735" x2="830" y2="270"/>
    <line x1="320" y1="720" x2="755" y2="265"/>
  </g>
  <!-- the one voice they look to -->
  <circle cx="795" cy="235" r="26" fill="rgb(233,234,255)"/>
  <circle cx="795" cy="235" r="52" fill="none" stroke="rgba(233,234,255,0.35)" stroke-width="2"/>
  <circle cx="795" cy="235" r="84" fill="none" stroke="rgba(233,234,255,0.15)" stroke-width="2"/>
</svg>
