<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="rgb(0,3,76)"/>
  <!-- the single stream in -->
  <path d="M 220 450 L 700 450" stroke="rgb(233,234,255)" stroke-width="14" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- decision point -->
  <circle cx="740" cy="450" r="22" fill="rgb(99,104,218)"/>
  <!-- funded heavily -->
  <path d="M 762 440 C 900 380, 1020 330, 1300 300" stroke="rgb(99,104,218)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- funded modestly -->
  <path d="M 762 455 C 920 470, 1060 490, 1300 500" stroke="rgba(99,104,218,0.5)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- held closed -->
  <path d="M 762 465 C 860 530, 920 580, 990 620" stroke="rgba(233,234,255,0.25)" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="12 12"/>
  <line x1="1010" y1="590" x2="1010" y2="660" stroke="rgb(233,234,255)" stroke-width="6"/>
</svg>
